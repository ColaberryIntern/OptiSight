global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'user_service'
    static_configs:
      - targets: ['user_service:3001']
    metrics_path: /metrics

  - job_name: 'analytics_service'
    static_configs:
      - targets: ['analytics_service:3003']
    metrics_path: /metrics

  - job_name: 'ai_engine'
    static_configs:
      - targets: ['ai_engine:5000']
    metrics_path: /metrics
