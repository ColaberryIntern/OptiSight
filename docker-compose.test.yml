services:
  # ── Test PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: retail_insight
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: retail_insight_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_insight"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test_network

networks:
  test_network:
    driver: bridge
