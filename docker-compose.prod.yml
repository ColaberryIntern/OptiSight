version: '3.8'

# OptiSight Production Deployment — Hetzner CPX32
# Ports: frontend=4000, gateway=4080, ai_engine=5001, services=4001-4005
# Avoids conflicts with existing services on 80,443,3000,5433,6380,8000,8085,8888

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: optisight-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retail_insight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-retail_insight}
    volumes:
      - optisight_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_insight"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: optisight-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  user_service:
    image: ghcr.io/colaberryintern/optisight/user-service:latest
    container_name: optisight-user-service
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://retail_insight:${POSTGRES_PASSWORD:-changeme}@postgres:5432/retail_insight
      JWT_SECRET: ${JWT_SECRET:-optisight-prod-jwt-secret-2026}
      JWT_EXPIRES_IN: 24h
      BCRYPT_SALT_ROUNDS: "10"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4001:3001"
    restart: unless-stopped

  data_ingestion_service:
    image: ghcr.io/colaberryintern/optisight/data-ingestion-service:latest
    container_name: optisight-data-ingestion
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://retail_insight:${POSTGRES_PASSWORD:-changeme}@postgres:5432/retail_insight
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4002:3002"
    restart: unless-stopped

  analytics_service:
    image: ghcr.io/colaberryintern/optisight/analytics-service:latest
    container_name: optisight-analytics
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://retail_insight:${POSTGRES_PASSWORD:-changeme}@postgres:5432/retail_insight
      REDIS_URL: redis://redis:6379
      AI_ENGINE_URL: http://ai_engine:5000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4003:3003"
    restart: unless-stopped

  recommendation_service:
    image: ghcr.io/colaberryintern/optisight/recommendation-service:latest
    container_name: optisight-recommendation
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://retail_insight:${POSTGRES_PASSWORD:-changeme}@postgres:5432/retail_insight
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4004:3004"
    restart: unless-stopped

  notification_service:
    image: ghcr.io/colaberryintern/optisight/notification-service:latest
    container_name: optisight-notification
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://retail_insight:${POSTGRES_PASSWORD:-changeme}@postgres:5432/retail_insight
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4005:3005"
    restart: unless-stopped

  ai_engine:
    image: ghcr.io/colaberryintern/optisight/ai-engine:latest
    container_name: optisight-ai-engine
    environment:
      DATABASE_URL: postgres://retail_insight:${POSTGRES_PASSWORD:-changeme}@postgres:5432/retail_insight
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis:6379
      FLASK_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/colaberryintern/optisight/frontend:latest
    container_name: optisight-frontend
    ports:
      - "4000:3000"
    depends_on:
      - ai_engine
    restart: unless-stopped

  gateway:
    image: ghcr.io/colaberryintern/optisight/gateway:latest
    container_name: optisight-gateway
    ports:
      - "4080:80"
      - "4443:443"
    depends_on:
      - frontend
      - ai_engine
      - user_service
      - data_ingestion_service
      - analytics_service
    restart: unless-stopped

volumes:
  optisight_pgdata:
