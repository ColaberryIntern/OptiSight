apiVersion: v1
kind: Service
metadata:
  name: data-ingestion-service
  namespace: optisight
  labels:
    app: data-ingestion-service
    tier: backend
    app.kubernetes.io/part-of: optisight-ai
spec:
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: 3002
      protocol: TCP
      name: http
  selector:
    app: data-ingestion-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion-service
  namespace: optisight
  labels:
    app: data-ingestion-service
    tier: backend
    app.kubernetes.io/part-of: optisight-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-ingestion-service
  template:
    metadata:
      labels:
        app: data-ingestion-service
        tier: backend
    spec:
      containers:
        - name: data-ingestion-service
          image: optisight/data-ingestion-service:latest
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: optisight-config
            - secretRef:
                name: optisight-secrets
          env:
            - name: SERVICE_NAME
              value: data_ingestion_service
            - name: DATA_INGESTION_SERVICE_PORT
              value: "3002"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-ingestion-service-hpa
  namespace: optisight
  labels:
    app: data-ingestion-service
    tier: backend
    app.kubernetes.io/part-of: optisight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-ingestion-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
