apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: optisight-ingress
  namespace: optisight
  labels:
    app.kubernetes.io/part-of: optisight-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: "analytics-service"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - optisight.example.com
      secretName: optisight-tls
  rules:
    - host: optisight.example.com
      http:
        paths:
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3001
          - path: /api/v1/data
            pathType: Prefix
            backend:
              service:
                name: data-ingestion-service
                port:
                  number: 3002
          - path: /api/v1/dashboard
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3003
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3003
          - path: /api/v1/recommendations
            pathType: Prefix
            backend:
              service:
                name: recommendation-service
                port:
                  number: 3004
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3005
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3003
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
