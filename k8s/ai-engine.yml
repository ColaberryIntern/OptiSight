apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: optisight
  labels:
    app: ai-engine
    tier: backend
    app.kubernetes.io/part-of: optisight-ai
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: ai-engine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: optisight
  labels:
    app: ai-engine
    tier: backend
    app.kubernetes.io/part-of: optisight-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
        tier: backend
    spec:
      containers:
        - name: ai-engine
          image: optisight/ai-engine:latest
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: optisight-config
            - secretRef:
                name: optisight-secrets
          env:
            - name: FLASK_ENV
              value: production
            - name: SERVICE_NAME
              value: ai_engine
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-engine-hpa
  namespace: optisight
  labels:
    app: ai-engine
    tier: backend
    app.kubernetes.io/part-of: optisight-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-engine
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
