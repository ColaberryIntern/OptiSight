apiVersion: v1
kind: ConfigMap
metadata:
  name: optisight-config
  namespace: optisight
  labels:
    app.kubernetes.io/part-of: optisight-ai
data:
  NODE_ENV: "production"
  JWT_EXPIRES_IN: "24h"
  REDIS_URL: "redis://redis:6379"
  DATABASE_URL: "postgres://retail_insight:changeme@postgres:5432/retail_insight"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  AI_ENGINE_URL: "http://ai-engine:5000"
  DATA_INGESTION_URL: "http://data-ingestion-service:3002"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3005"
